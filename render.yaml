# render.yaml - Deploy both backend and frontend on Render
# Place this file in the ROOT of your project (jwm-church/)

services:
  # ---- BACKEND ----
  - type: web
    name: jwm-church-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      # Add all other env vars in Render Dashboard > Environment

  # ---- FRONTEND ----
  - type: web
    name: jwm-church-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
